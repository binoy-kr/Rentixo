<div class="min-h-screen relative flex items-center justify-center px-4 bg-cover bg-center"
    style="background-image: url('https://images.unsplash.com/photo-1503376780353-7e6692767b70?auto=format&fit=crop&w=1600&q=80');">

    <!-- Dark Overlay -->
    <div class="absolute inset-0 bg-black/60"></div>

    <!-- Card -->
    <div
        class="relative w-full max-w-2xl bg-white/10 backdrop-blur-xl border border-white/20 rounded-3xl shadow-2xl p-8">

        <!-- Title -->
        <div class="text-center mb-6">
            <h1 class="text-3xl font-bold text-white">Create Account</h1>
            <p class="text-blue-100 text-sm mt-2">Sign up to start renting cars</p>
        </div>

        <!-- Form -->
        <form class="grid grid-cols-1 md:grid-cols-2 gap-5">

            <div>
                <label class="text-white text-sm mb-2 block">First Name</label>
                <input type="email" placeholder="Enter First Name"
                    class="w-full px-4 py-3 rounded-2xl bg-white/90 outline-none focus:ring-4 focus:ring-white/30">
            </div>
            <div>
                <label class="text-white text-sm mb-2 block">Last Name</label>
                <input type="email" placeholder="Enter Last Name"
                    class="w-full px-4 py-3 rounded-2xl bg-white/90 outline-none focus:ring-4 focus:ring-white/30">
            </div>
            <div>
                <label class="text-white text-sm mb-2 block">Email</label>
                <input type="email" placeholder="Enter email"
                    class="w-full px-4 py-3 rounded-2xl bg-white/90 outline-none focus:ring-4 focus:ring-white/30">
            </div>

            <!-- Phone -->
            <div>
                <label class="text-white text-sm mb-2 block">Phone Number</label>
                <input type="text" placeholder="Enter phone number"
                    class="w-full px-4 py-3 rounded-2xl bg-white/90 outline-none focus:ring-4 focus:ring-white/30">
            </div>

            <!-- Password -->
            <div>
                <label class="text-white text-sm mb-2 block">Password</label>
                <input type="password" placeholder="Enter password"
                    class="w-full px-4 py-3 rounded-2xl bg-white/90 outline-none focus:ring-4 focus:ring-white/30">
            </div>

            <!-- Confirm Password -->
            <div>
                <label class="text-white text-sm mb-2 block">Confirm Password</label>
                <input type="password" placeholder="Re-enter password"
                    class="w-full px-4 py-3 rounded-2xl bg-white/90 outline-none focus:ring-4 focus:ring-white/30">
            </div>

            <!-- Terms -->
            <div class="md:col-span-2 flex items-center gap-2 text-sm text-white/80">
                <input type="checkbox" class="accent-blue-500">
                I agree to terms & conditions
            </div>

            <!-- Button -->
            <div class="md:col-span-2">
                <button type="submit"
                    class="w-full bg-white text-blue-600 font-semibold py-3 rounded-2xl hover:bg-blue-50 transition-all shadow-lg hover:scale-[1.02]">
                    Create Account
                </button>
            </div>

        </form>

        <!-- Footer -->
        <p class="text-center text-white/70 text-sm mt-6">
            Already have an account?
            <a routerLink="/login" class="text-white font-medium hover:underline">
                Sign in
            </a>
        </p>

    </div>
</div>
