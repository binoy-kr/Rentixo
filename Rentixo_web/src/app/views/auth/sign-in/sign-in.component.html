<div class="min-h-screen relative flex items-center justify-center px-4 bg-cover bg-center"
    style="background-image: url('https://images.unsplash.com/photo-1503376780353-7e6692767b70?auto=format&fit=crop&w=1600&q=80');">

    <!-- Dark Overlay -->
    <div class="absolute inset-0 bg-black/60"></div>

    <!-- Login Card -->
    <div
        class="relative w-full max-w-md bg-white/10 backdrop-blur-xl border border-white/20 rounded-3xl shadow-2xl p-8">

        <!-- Title -->
        <div class="text-center mb-8">

            <h1 class="text-3xl font-bold text-white">
                Car Rental Login
            </h1>

            <p class="text-blue-100 text-sm mt-2">
                Welcome back! Please sign in to continue
            </p>

        </div>

        <!-- Form -->
        <form class="space-y-5">

            <!-- Email -->
            <div>
                <label class="text-white text-sm mb-2 block">Email</label>

                <input type="email" placeholder="Enter email"
                    class="w-full px-4 py-3 rounded-2xl bg-white/90 outline-none focus:ring-4 focus:ring-white/30 transition-all">
            </div>

            <!-- Password -->
            <div>
                <label class="text-white text-sm mb-2 block">Password</label>

                <input type="password" placeholder="Enter password"
                    class="w-full px-4 py-3 rounded-2xl bg-white/90 outline-none focus:ring-4 focus:ring-white/30 transition-all">
            </div>

            <!-- Remember + Forgot -->
            <div class="flex items-center justify-between text-sm text-white/80">

                <label class="flex items-center gap-2">
                    <input type="checkbox" class="accent-blue-500">
                    Remember me
                </label>

                <a href="#" class="hover:text-white transition">
                    Forgot password?
                </a>

            </div>

            <!-- Button -->
            <button type="submit"
                class="w-full bg-white text-blue-600 font-semibold py-3 rounded-2xl hover:bg-blue-50 transition-all shadow-lg hover:scale-[1.02]">

                Sign In

            </button>

        </form>

        <!-- Footer -->
        <p class="text-center text-white/70 text-sm mt-6">
            Don’t have an account?
            <a routerLink="/signup" class="text-white font-medium hover:underline">
                Sign up
            </a>
        </p>

    </div>

</div>
