<app-navbar></app-navbar>

<section class="bg-gray-950 text-white py-24 min-h-screen">
  <div class="max-w-4xl mx-auto px-6">
    <div class="text-center mb-14">
      <h1 class="text-5xl font-bold">
        Contact <span class="text-yellow-400">Us</span>
      </h1>
    </div>

    <div class="bg-black p-10 rounded-3xl shadow-2xl border border-gray-800">
      <div class="grid md:grid-cols-2 gap-6">
        <input
          type="text"
          placeholder="Your Name"
          class="bg-gray-900 p-4 rounded-xl outline-none border border-gray-700"
        />

        <input
          type="email"
          placeholder="Your Email"
          class="bg-gray-900 p-4 rounded-xl outline-none border border-gray-700"
        />
      </div>

      <textarea
        rows="6"
        placeholder="Your Message"
        class="bg-gray-900 p-4 rounded-xl outline-none border border-gray-700 w-full mt-6"
      ></textarea>

      <button
        class="bg-yellow-400 hover:bg-yellow-300 text-black px-8 py-3 rounded-xl font-semibold mt-6 duration-300"
      >
        Send Message
      </button>
    </div>
  </div>
</section>
<app-footer></app-footer>
