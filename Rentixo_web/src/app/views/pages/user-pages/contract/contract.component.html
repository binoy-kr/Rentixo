<app-navbar></app-navbar>

<section class="bg-neutral-950 text-white py-32 min-h-screen flex items-center">
  <div class="max-w-4xl mx-auto px-6 w-full">
    <div class="text-center mb-16 space-y-3">
      <p class="text-xs font-bold tracking-widest text-amber-400 uppercase">// CONNECT WITH CONCIERGE</p>
      <h1 class="text-4xl md:text-6xl font-black tracking-tight">CONTACT US</h1>
    </div>

    <div class="bg-neutral-900 p-8 md:p-12 rounded-[2.5rem] shadow-2xl border border-white/5">
      <form class="space-y-6">
        <div class="grid md:grid-cols-2 gap-6">
          <div class="space-y-2">
            <label class="text-[11px] font-bold uppercase tracking-widest text-neutral-400">Full Name</label>
            <input
              type="text"
              placeholder="Elon Musk"
              class="w-full bg-neutral-950 p-4 rounded-xl outline-none border border-white/5 focus:border-amber-400 duration-300 text-white text-sm"
            />
          </div>

          <div class="space-y-2">
            <label class="text-[11px] font-bold uppercase tracking-widest text-neutral-400">Email Address</label>
            <input
              type="email"
              placeholder="elon@spacex.com"
              class="w-full bg-neutral-950 p-4 rounded-xl outline-none border border-white/5 focus:border-amber-400 duration-300 text-white text-sm"
            />
          </div>
        </div>

        <div class="space-y-2">
          <label class="text-[11px] font-bold uppercase tracking-widest text-neutral-400">Your Message</label>
          <textarea
            rows="5"
            placeholder="Describe your bespoke requirements..."
            class="w-full bg-neutral-950 p-4 rounded-xl outline-none border border-white/5 focus:border-amber-400 duration-300 text-white text-sm resize-none"
          ></textarea>
        </div>

        <button
          type="submit"
          class="w-full bg-gradient-to-r from-amber-400 to-yellow-500 hover:from-yellow-500 hover:to-amber-500 text-neutral-950 py-4 rounded-xl font-black text-sm uppercase tracking-wider duration-300 shadow-xl shadow-amber-500/10 hover:scale-[1.01]"
        >
          Dispatch Message
        </button>
      </form>
    </div>
  </div>
</section>
<app-footer></app-footer>
