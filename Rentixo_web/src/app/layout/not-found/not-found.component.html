<div class="min-h-screen flex items-center justify-center bg-gray-100 px-4">

    <div class="max-w-xl w-full bg-white rounded-3xl shadow-xl p-10 text-center border border-gray-200">

        <!-- Error Code -->
        <h1 class="text-8xl font-extrabold text-blue-600 tracking-widest">
            404
        </h1>

        <!-- Title -->
        <h2 class="mt-4 text-3xl font-bold text-gray-800">
            Page Not Found
        </h2>

        <!-- Description -->
        <p class="mt-3 text-gray-500 leading-relaxed">
            Sorry, the page you are looking for does not exist,
            has been removed, or is temporarily unavailable.
        </p>

        <!-- Illustration -->
        <div class="my-8 flex justify-center">

            <div class="relative">

                <div class="w-40 h-40 rounded-full bg-blue-100 flex items-center justify-center">

                    <span class="text-7xl">
                        🚫
                    </span>

                </div>

                <div class="absolute -top-2 -right-2 bg-red-500 text-white text-sm px-3 py-1 rounded-full shadow-lg">
                    ERROR
                </div>

            </div>

        </div>

        <!-- Buttons -->
        <div class="flex flex-col sm:flex-row gap-4 justify-center">

            <a routerLink="/"
                class="px-6 py-3 rounded-xl bg-blue-600 hover:bg-blue-700 text-white font-semibold transition-all shadow-md">

                Go Home

            </a>

            <button onclick="history.back()"
                class="px-6 py-3 rounded-xl border border-gray-300 hover:bg-gray-100 text-gray-700 font-semibold transition-all">

                Go Back

            </button>

        </div>

    </div>

</div>
